name: Dependency Audit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap
        uses: ./.github/actions/bootstrap

      - name: Audit pnpm dependencies (fail on moderate+)
        uses: JamesRobertWiseman/pnpm-audit@a6a8cc297d146014c029926e49d43571e776f85e # v3.2.0
        with:
          package_json_path: ./
          github_token: ${{ secrets.GITHUB_TOKEN }}
          level: moderate
          fails: true
          single_comment: true
