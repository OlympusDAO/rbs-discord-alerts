name: pnpm CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap
        uses: ./.github/actions/bootstrap

      - name: Run build
        run: pnpm run build

  lint_check:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap
        uses: ./.github/actions/bootstrap

      - name: Run lint:check
        run: pnpm run lint:check
